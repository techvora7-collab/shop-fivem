<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM Shop</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#6c2bd9;
padding:20px;
text-align:center;
}

header h1{
margin:0;
}

.container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:40px;
}

.card{
background:#1d1d1d;
padding:20px;
width:250px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card h2{
color:#b388ff;
}

button{
background:#6c2bd9;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#8247e5;
}

footer{
text-align:center;
padding:20px;
background:#181818;
}
</style>

</head>
<body>

<header>
<h1>🎮 FiveM Shop</h1>
<p>Magazin Oficial</p>
</header>

<div class="container">

<div class="card">
<h2>VIP Bronze</h2>
<p>5 €</p>
<button>Cumpără</button>
</div>

<div class="card">
<h2>VIP Silver</h2>
<p>10 €</p>
<button>Cumpără</button>
</div>

<div class="card">
<h2>VIP Gold</h2>
<p>20 €</p>
<button>Cumpără</button>
</div>

</div>

<footer>
© 2026 FiveM Shop
</footer>

</body>
</html>
